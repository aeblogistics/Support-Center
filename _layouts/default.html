<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.7;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #1a3c5e, #2980b9);
            color: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
        }

        .logo .icon { font-size: 22px; }

        nav a {
            color: #fff;
            margin-left: 24px;
            font-size: 14px;
            text-decoration: none;
            opacity: 0.85;
        }

        nav a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* ── Hero / Search Bar ── */
        .hero {
            background: linear-gradient(135deg, #1a3c5e 0%, #2980b9 100%);
            color: #fff;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .hero p {
            font-size: 17px;
            opacity: 0.9;
            margin-bottom: 28px;
        }

        .search-box {
            display: flex;
            max-width: 520px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            font-size: 15px;
            border: none;
            outline: none;
        }

        .search-box button {
            background: #e8a020;
            color: #fff;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #cf8f1a;
        }

        /* ── Breadcrumb ── */
        .breadcrumb {
            max-width: 960px;
            margin: 24px auto 0;
            padding: 0 20px;
            font-size: 13px;
            color: #999;
        }

        .breadcrumb a {
            color: #2980b9;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            margin: 0 6px;
        }

        /* ── Main ── */
        main {
            max-width: 960px;
            margin: 24px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.06);
            padding: 24px;
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 14px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar ul li {
            margin-bottom: 4px;
        }

        .sidebar ul li a {
            display: block;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            color: #444;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }

        .sidebar ul li a:hover {
            background: #e8f4fd;
            color: #2980b9;
        }

        .sidebar ul li a.active {
            background: #e8f4fd;
            color: #2980b9;
            font-weight: 600;
        }

        .sidebar-divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 16px 0;
        }

        /* ── Content Box ── */
        .content-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.06);
            padding: 40px;
            min-width: 0;
        }

        /* ── Featured Image ── */
        .featured-image {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .featured-image img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        /* ── Page Title & Meta ── */
        .page-title {
            font-size: 30px;
            color: #1a3c5e;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .page-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .page-date {
            font-size: 13px;
            color: #999;
        }

        .page-category {
            font-size: 12px;
            background: #e8f4fd;
            color: #2980b9;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* ── Content Typography ── */
        .content-box h1 {
            font-size: 26px;
            color: #1a3c5e;
            margin: 28px 0 12px;
        }

        .content-box h2 {
            font-size: 21px;
            color: #1a3c5e;
            margin: 32px 0 12px;
            border-bottom: 2px solid #e8f4fd;
            padding-bottom: 8px;
        }

        .content-box h3 {
            font-size: 17px;
            color: #2980b9;
            margin: 20px 0 10px;
        }

        .content-box h4 {
            font-size: 15px;
            color: #444;
            margin: 16px 0 8px;
        }

        .content-box p {
            margin-bottom: 16px;
            color: #555;
            font-size: 15px;
        }

        .content-box ul,
        .content-box ol {
            margin: 12px 0 16px 24px;
        }

        .content-box ul li,
        .content-box ol li {
            margin-bottom: 8px;
            color: #555;
            font-size: 15px;
        }

        .content-box a {
            color: #2980b9;
            text-decoration: none;
        }

        .content-box a:hover {
            text-decoration: underline;
        }

        .content-box hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 28px 0;
        }

        .content-box blockquote {
            background: #e8f4fd;
            border-left: 4px solid #2980b9;
            padding: 16px 20px;
            border-radius: 0 8px 8px 0;
            color: #555;
            margin: 16px 0;
            font-size: 15px;
        }

        .content-box table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 14px;
        }

        .content-box th {
            background: #1a3c5e;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
        }

        .content-box td {
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
        }

        .content-box tr:hover td {
            background: #e8f4fd;
        }

        .content-box code {
            background: #f5f7fa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            color: #2980b9;
        }

        .content-box pre {
            background: #1a1a1a;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .content-box pre code {
            background: none;
            color: #f8f8f2;
            padding: 0;
            font-size: 13px;
        }

        .content-box img {
            max-width: 100%;
            border-radius: 8px;
            margin: 12px 0;
        }

        /* ── Info / Warning / Tip Boxes ── */
        .content-box .tip {
            background: #e8f8f0;
            border-left: 4px solid #27ae60;
            padding: 14px 18px;
            border-radius: 0 8px 8px 0;
            color: #2e7d52;
            margin: 16px 0;
            font-size: 14px;
        }

        .content-box .warning {
            background: #fef9e7;
            border-left: 4px solid #f39c12;
            padding: 14px 18px;
            border-radius: 0 8px 8px 0;
            color: #7d6608;
            margin: 16px 0;
            font-size: 14px;
        }

        /* ── Was this helpful? ── */
        .helpful-box {
            background: #f
